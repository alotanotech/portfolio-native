<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="./output.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Lyan Portfolio</title>
  </head>

  <body class="bg-red-100 text-black flex flex-col min-h-screen">
    <header class="w-full text-black bg-yellow-300 rounded shadow-md">
      <div
        class="pl-20 px-10 pr-20 py-8 flex justify-between items-center mx-auto"
      >
        <img
          src="./assets/Chrislogo 2.png"
          class="w-16 h-16 rounded-xl"
          alt="Logo"
        />

        <nav class="text-base font-semibold px-10 pr-20">
          <ul class="flex gap-8">
            <li>
              <a href="index.html" id="nav-projects" class="nav-link">
                Projects
              </a>
            </li>

            <li>
              <a href="about.html" id="nav-about" class="nav-link"> About </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="relative w-full overflow-hidden">
      <img
        src="./assets/introduction (1).png"
        alt="About Me Banner"
        class="w-full h-auto object-cover"
      />
      <img
        src="./assets/LyanEmote.gif"
        class="absolute -bottom-80 -right-65 w-[800px] pointer-events-none"
      />

      <div class="absolute inset-0 ="></div>
    </section>
    <main class="bg-white">
      <!-- ========================= -->
      <!-- PROJECT CATALOGUE -->
      <!-- ========================= -->
      <section id="catalogue" class="max-w-7xl mx-auto px-8 py-24">
        <!-- Title -->
        <div
          class="relative mb-16 overflow-hidden rounded-3xl bg-cover bg-[50%_25%] bg-no-repeat"
          style="background-image: url(&quot;./assets/Lyan1.gif&quot;)"
        >
          <!-- Glass Overlay -->
          <div class="absolute inset-0 backdrop-blur-xs"></div>

          <!-- Content -->
          <div
            class="relative flex flex-col items-center justify-center py-24 text-center px-8"
          >
            <h2 class="text-5xl font-bold text-white">Selected Projects</h2>

            <p class="mt-4 max-w-4xl text-lg leading-8 text-white">
              A selection of branding, social media, and personal design
              projects that I have worked on. Click any project to view the
              complete case study and all of the designs created for that brand.
            </p>
          </div>
        </div>
        <!-- Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
          <!-- PROJECT 1 -->
          <button onclick="openProject('pcba')" class="group text-left">
            <div class="overflow-hidden rounded-2xl bg-zinc-100 aspect-video">
              <img
                src="./assets/project1/PSI.png"
                class="w-full h-full object-cover transition duration-500 group-hover:scale-105"
              />
            </div>

            <h3 class="mt-6 text-xl font-semibold">
              PT. PCBA Semiconductor International
            </h3>

            <p class="mt-2 text-zinc-500">Social Media Design</p>
          </button>

          <!-- PROJECT 2 -->
          <button onclick="openProject('brand2')" class="group text-left">
            <div class="overflow-hidden rounded-2xl bg-zinc-100 aspect-video">
              <img
                src="./assets/project2/LittleLady.png"
                class="w-full h-full object-cover transition duration-500 group-hover:scale-105"
              />
            </div>

            <h3 class="mt-6 text-xl font-semibold">Little Lady</h3>

            <p class="mt-2 text-zinc-500">Social Media Design</p>
          </button>

          <!-- PROJECT 3 -->
          <button onclick="openProject('brand3')" class="group text-left">
            <div class="overflow-hidden rounded-2xl bg-zinc-100 aspect-video">
              <img
                src="./assets/project3/Pacohome.png"
                class="w-full h-full object-cover transition duration-500 group-hover:scale-105"
              />
            </div>

            <h3 class="mt-6 text-xl font-semibold">Pacohome</h3>

            <p class="mt-2 text-zinc-500">Social Media Design</p>
          </button>

          <!-- PROJECT 4 -->
          <button onclick="openProject('brand4')" class="group text-left">
            <div class="overflow-hidden rounded-2xl bg-zinc-100 aspect-video">
              <img
                src="./assets/project4/Adiograf Indonesia.png"
                class="w-full h-full object-cover transition duration-500 group-hover:scale-105"
              />
            </div>

            <h3 class="mt-6 text-xl font-semibold">Adiograf Indonesia</h3>

            <p class="mt-2 text-zinc-500">Social Media Design</p>
          </button>
        </div>
      </section>

      <!-- ========================= -->
      <!-- PROJECT DETAIL -->
      <!-- ========================= -->

      <section id="project-detail" class="hidden max-w-6xl mx-auto px-8 py-24">
        <!-- Back -->
        <button
          onclick="closeProject()"
          class="mb-12 text-yellow-500 font-semibold hover:underline"
        >
          ← Back to Projects
        </button>

        <!-- Title -->
        <h2 id="project-title" class="text-5xl font-bold">Project Title</h2>

        <p id="project-category" class="mt-4 text-xl text-zinc-500">Category</p>

        <!-- Cover -->
        <img id="project-cover" src="" class="w-full rounded-3xl mt-12" />

        <!-- Description -->
        <p
          id="project-description"
          class="mt-12 text-lg leading-8 text-justify"
        >
          Description...
        </p>

        <!-- Gallery -->
        <div
          id="project-gallery"
          class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-16"
        >
          <!-- Images inserted with JS -->
        </div>
      </section>
    </main>
    <script src="./js/script.js"></script>
  </body>
</html>
